<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المدونة — NEORA</title>
  <meta name="description" content="أحدث المقالات حول أدوات الذكاء الاصطناعي والتقنية" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fafaf8; color: #0f0f0f; font-family: 'Cairo', sans-serif; min-height: 100vh; }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid rgba(212,175,55,0.25);
      position: sticky; top: 0; background: rgba(255,255,255,0.97);
      backdrop-filter: blur(10px); z-index: 100;
      box-shadow: 0 1px 20px rgba(212,175,55,0.08);
    }
    .logo {
      font-size: 1.5rem; font-weight: 900; text-decoration: none; letter-spacing: 0.1em;
      background: linear-gradient(135deg,#b8962e,#d4af37,#9a7d24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { color: #334155; text-decoration: none; font-size: 0.9rem; font-weight: 700; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #b8962e; }

    /* ── HERO ── */
    .hero {
      text-align: center; padding: 3rem 2rem 2.5rem;
      background: linear-gradient(180deg,#fffdf5 0%,#fafaf8 100%);
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 300px;
      background: radial-gradient(ellipse, rgba(212,175,55,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3);
      padding: 5px 16px; border-radius: 50px; font-size: 0.8rem;
      color: #9a7d24; font-weight: 700; margin-bottom: 1rem;
    }
    .hero h1 { font-size: 2.2rem; font-weight: 900; color: #0f0f0f; margin-bottom: 0.5rem; }
    .hero h1 span { background: linear-gradient(135deg,#b8962e,#d4af37,#9a7d24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: #475569; font-size: 1rem; font-weight: 600; }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* ── FEATURED ── */
    .featured-section { margin-bottom: 3rem; }
    .section-eyebrow {
      font-size: 0.72rem; font-weight: 800; color: #9a7d24;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 1rem; display: flex; align-items: center; gap: 10px;
    }
    .section-eyebrow::after { content: ''; flex: 1; height: 1px; background: rgba(212,175,55,0.2); }

    .featured-card {
      background: #fff; border: 1px solid rgba(212,175,55,0.25); border-radius: 20px;
      overflow: hidden; display: grid; grid-template-columns: 1.1fr 1fr;
      box-shadow: 0 4px 28px rgba(212,175,55,0.1); transition: all 0.3s;
      text-decoration: none; color: inherit; position: relative;
    }
    .featured-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #d4af37, #b8962e); z-index: 1; }
    .featured-card:hover { transform: translateY(-4px); box-shadow: 0 16px 52px rgba(212,175,55,0.18); border-color: rgba(212,175,55,0.4); }

    /* ── صورة المقال المميز ── */
    .featured-img {
      aspect-ratio: 16/9;
      background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, #1a1a1a 60%, #111111 100%);
      display: flex; align-items: center; justify-content: center;
      border-left: 1px solid rgba(212,175,55,0.15);
      position: relative; overflow: hidden;
    }
    .featured-img img {
      width: 70%; height: 70%; object-fit: contain;
      position: relative; z-index: 2; transition: transform 0.4s ease;
      filter: drop-shadow(0 4px 20px rgba(212,175,55,0.25));
    }
    .featured-card:hover .featured-img img { transform: scale(1.06); }

    /* هالة ذهبية خلف اللوغو */
    .featured-img::before {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(212,175,55,0.18) 0%, transparent 65%),
        radial-gradient(circle at 20% 20%, rgba(212,175,55,0.10) 0%, transparent 40%);
    }
    /* شبكة خفيفة */
    .featured-img::after {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background-image: linear-gradient(rgba(212,175,55,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,175,55,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .featured-body { padding: 2.25rem 2rem; display: flex; flex-direction: column; justify-content: center; gap: 0; }
    .featured-tag {
      display: inline-block; background: rgba(212,175,55,0.12); color: #9a7d24;
      font-size: 0.7rem; font-weight: 800; padding: 3px 12px; border-radius: 50px; margin-bottom: 0.9rem;
      width: fit-content;
    }
    .featured-title { font-size: 1.35rem; font-weight: 900; color: #0f0f0f; line-height: 1.55; margin-bottom: 0.7rem; }
    .featured-desc { font-size: 0.88rem; color: #475569; line-height: 1.85; margin-bottom: 1rem; font-weight: 500; }
    .featured-meta { font-size: 0.74rem; color: #94a3b8; font-weight: 600; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 12px; }
    .featured-cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg,#d4af37,#b8962e); color: #fff;
      padding: 10px 22px; border-radius: 10px; font-size: 0.85rem; font-weight: 800;
      width: fit-content; transition: opacity 0.2s, transform 0.2s;
    }
    .featured-cta:hover { opacity: 0.88; transform: translateX(-2px); }

    /* ── GRID ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .section-count { font-size: 0.75rem; color: #94a3b8; font-weight: 600; background: rgba(212,175,55,0.08); padding: 3px 10px; border-radius: 20px; }

    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 1.5rem; }

    .post-card {
      background: #fff; border: 1px solid rgba(212,175,55,0.18);
      border-radius: 16px; overflow: hidden; transition: all 0.28s;
      text-decoration: none; color: inherit; display: flex; flex-direction: column;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04); position: relative;
    }
    .post-card:hover { border-color: rgba(212,175,55,0.42); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(212,175,55,0.13); }

    /* ── صورة البطاقة ── */
    .card-img {
      aspect-ratio: 16/9;
      max-height: 160px;
      background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, #1a1a1a 60%, #111111 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      border-bottom: 1px solid rgba(212,175,55,0.1);
    }

    /* اللوغو داخل البطاقة */
    .card-img img {
      width: 55%; height: 55%; object-fit: contain;
      position: relative; z-index: 2; transition: transform 0.35s ease;
      filter: drop-shadow(0 2px 12px rgba(212,175,55,0.3));
    }
    .post-card:hover .card-img img { transform: scale(1.08); }

    /* هالة ذهبية خلف لوغو البطاقة */
    .card-img::before {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse at 50% 50%, rgba(212,175,55,0.16) 0%, transparent 60%);
    }
    /* شبكة خفيفة */
    .card-img::after {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background-image: linear-gradient(rgba(212,175,55,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,175,55,0.05) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* شارة الفئة فوق الصورة */
    .card-category-badge {
      position: absolute; bottom: 8px; right: 10px; z-index: 3;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
      color: #d4af37; font-size: 0.62rem; font-weight: 800;
      padding: 3px 9px; border-radius: 20px; letter-spacing: 0.5px;
    }

    /* ── Smart fallback (عند عدم وجود صورة) ── */
    .smart-art {
      width: 100%; height: 100%; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; padding: 1.2rem;
      background:
        radial-gradient(circle at 18% 18%, rgba(212,175,55,0.30), transparent 28%),
        radial-gradient(circle at 82% 72%, rgba(184,150,46,0.22), transparent 30%),
        linear-gradient(135deg, #121107 0%, #25200f 52%, #0f0f0b 100%);
      overflow: hidden;
    }
    .smart-art::before {
      content: ''; position: absolute; inset: -35%; opacity: 0.12;
      background-image: linear-gradient(rgba(212,175,55,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,175,55,0.5) 1px, transparent 1px);
      background-size: 28px 28px; transform: rotate(-8deg);
    }
    .smart-art-inner {
      position: relative; z-index: 2; width: min(82%, 360px);
      display: flex; align-items: center; justify-content: center; gap: 0.8rem;
      color: #f8e6a0; text-align: center;
    }
    .smart-art-mark {
      width: 58px; height: 58px; border-radius: 18px;
      display: grid; place-items: center; font-size: 1.85rem;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(212,175,55,0.35);
      box-shadow: 0 12px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .smart-art-title {
      max-width: 220px; font-size: 0.86rem; line-height: 1.55; font-weight: 900;
      color: #fff8dc; text-shadow: 0 2px 12px rgba(0,0,0,0.35);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .featured-img .smart-art-inner { flex-direction: column; gap: 1rem; }
    .featured-img .smart-art-mark { width: 86px; height: 86px; border-radius: 26px; font-size: 2.7rem; }
    .featured-img .smart-art-title { max-width: 360px; font-size: 1.15rem; }

    .card-body { padding: 1.1rem 1.2rem 1rem; flex: 1; display: flex; flex-direction: column; }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 0.55rem; flex-wrap: wrap; }
    .card-date { font-size: 0.7rem; color: #94a3b8; font-weight: 600; }
    .card-badge { font-size: 0.62rem; font-weight: 800; padding: 2px 8px; border-radius: 50px; }
    .badge-new { background: rgba(212,175,55,0.12); color: #9a7d24; }
    .badge-popular { background: rgba(239,68,68,0.08); color: #dc2626; }
    .badge-updated { background: rgba(16,185,129,0.08); color: #059669; }
    .badge-editors { background: rgba(139,92,246,0.08); color: #7c3aed; }

    .card-title {
      font-size: 1.03rem; font-weight: 900; color: #0f0f0f; line-height: 1.55;
      margin-bottom: 0.55rem;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-desc {
      font-size: 0.88rem; color: #4a5568; line-height: 1.75; font-weight: 500; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-read {
      margin-top: 0.9rem; font-size: 0.78rem; color: #b8962e; font-weight: 800;
      display: flex; align-items: center; gap: 4px;
      border-top: 1px solid rgba(212,175,55,0.1); padding-top: 0.75rem;
    }
    .card-read::after { content: '←'; margin-right: 2px; transition: margin 0.2s; }
    .post-card:hover .card-read::after { margin-right: 6px; }

    .empty { text-align: center; padding: 4rem 2rem; color: #94a3b8; }
    .empty h2 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #64748b; }
    #loading { text-align: center; padding: 3rem; color: #94a3b8; font-size: 1rem; }

    footer {
      text-align: center; padding: 2rem; margin-top: 4rem;
      border-top: 1px solid rgba(212,175,55,0.15); color: #94a3b8;
      font-size: 0.85rem; background: #fff;
    }
    footer a { color: #b8962e; text-decoration: none; font-weight: 700; }

    @media (max-width: 768px) {
      .featured-card { grid-template-columns: 1fr; }
      .featured-img { aspect-ratio: 16/9; max-height: 220px; border-left: none; border-bottom: 1px solid rgba(212,175,55,0.15); }
      .featured-body { padding: 1.5rem; }
      .featured-title { font-size: 1.15rem; }
      .hero h1 { font-size: 1.7rem; }
      nav { padding: 1rem; }
      .posts-grid { grid-template-columns: 1fr; }
      .card-img { max-height: 180px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">NEORA</a>
  <ul class="nav-links">
    <li><a href="/">الرئيسية</a></li>
    <li><a href="/blog" class="active">المدونة</a></li>
    <li><a href="/#tools-section">الأدوات</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-badge">✦ المدونة</div>
  <h1>مدونة <span>NEORA</span></h1>
  <p>أحدث المقالات حول أدوات الذكاء الاصطناعي والتقنية</p>
</div>

<div class="container">
  <div id="loading">⏳ جاري تحميل المقالات...</div>

  <div id="blog-content" style="display:none">
    <!-- Featured -->
    <div class="featured-section" id="featured-section" style="display:none">
      <div class="section-eyebrow">⭐ المقال المميز</div>
      <a href="#" class="featured-card" id="featured-card">
        <div class="featured-img" id="featured-img"></div>
        <div class="featured-body">
          <span class="featured-tag">مقال مميز</span>
          <div class="featured-title" id="featured-title"></div>
          <div class="featured-desc" id="featured-desc"></div>
          <div class="featured-meta" id="featured-meta"></div>
          <span class="featured-cta">اقرأ المقال</span>
        </div>
      </a>
    </div>

    <!-- Grid -->
    <div class="section-header">
      <div class="section-eyebrow" style="margin-bottom:0">📚 جميع المقالات</div>
      <div class="section-count" id="posts-count"></div>
    </div>
    <div class="posts-grid" id="posts-grid"></div>
  </div>

  <div class="empty" id="empty" style="display:none">
    <h2>لا توجد مقالات بعد</h2>
    <p>سيتم نشر المقالات قريباً</p>
  </div>
</div>

<footer>
  <a href="/">NEORA</a> — دليل شامل لأقوى أدوات الذكاء الاصطناعي
</footer>

<script>
function escapeHTML(value) {
  return String(value || '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}

function getVisualMeta(post) {
  const title = (post.title || '').toLowerCase();
  if (title.includes('lovable') && title.includes('bolt')) return { icon: '⚡', label: 'Lovable vs Bolt' };
  if (title.includes('windsurf') || title.includes('cursor')) return { icon: '💻', label: 'Windsurf vs Cursor' };
  if (title.includes('notebook')) return { icon: '📓', label: 'NotebookLM Review' };
  if (title.includes('يوتيوب') || title.includes('youtube')) return { icon: '▶️', label: 'YouTube AI' };
  if (title.includes('صور') || title.includes('image')) return { icon: '🎨', label: 'AI Image Tools' };
  if (title.includes('فيديو') || title.includes('video')) return { icon: '🎬', label: 'AI Video Tools' };
  if (title.includes('برمج') || title.includes('كود')) return { icon: '💻', label: 'AI Coding' };
  if (title.includes('بحث')) return { icon: '🔬', label: 'AI Research' };
  if (title.includes('طلاب')) return { icon: '📚', label: 'AI for Students' };
  if (title.includes('تسويق')) return { icon: '📈', label: 'AI Marketing' };
  if (title.includes('chatgpt') || title.includes('claude') || title.includes('gemini')) return { icon: '🤖', label: 'AI Comparison' };
  if (title.includes('مواقع') || title.includes('تطبيق')) return { icon: '🚀', label: 'AI Web Tools' };
  return { icon: '✦', label: 'NEORA Insight' };
}

function smartArt(post) {
  const meta = getVisualMeta(post);
  return `<div class="smart-art" aria-hidden="true">
    <div class="smart-art-inner">
      <div class="smart-art-mark">${escapeHTML(meta.icon)}</div>
      <div class="smart-art-title">${escapeHTML(meta.label)}</div>
    </div>
  </div>`;
}

function estimateReadingMinutes(post) {
  const text = [post.title, post.description, post.content].filter(Boolean).join(' ');
  const words = text.trim().split(/\s+/).filter(Boolean).length;
  return post.readingMinutes || Math.max(3, Math.round(words / 200) || 5);
}

function formatDate(date, options) {
  const d = date ? new Date(date) : null;
  return d && !isNaN(d) ? d.toLocaleDateString('ar-SA', options) : '';
}

function getBadge(post, index) {
  const date = post.date ? new Date(post.date) : null;
  const days = date && !isNaN(date) ? (new Date() - date) / 864e5 : 999;
  if (post.editorsPick) return '<span class="card-badge badge-editors">✦ اختيار المحرر</span>';
  if (post.featured) return '<span class="card-badge badge-editors">✦ مميز</span>';
  if (days < 7) return '<span class="card-badge badge-new">✦ جديد</span>';
  if (post.updated) return '<span class="card-badge badge-updated">↑ محدّث</span>';
  if (index >= 0 && index <= 2) return '<span class="card-badge badge-popular">🔥 شائع</span>';
  return '';
}

function getCategory(post) {
  if (post.category) return post.category;
  const t = (post.title || '').toLowerCase();
  if (t.includes('مقارنة') || t.includes('vs')) return 'مقارنة';
  if (t.includes('شرح') || t.includes('كيف') || t.includes('دليل')) return 'دليل';
  if (t.includes('مراجعة')) return 'مراجعة';
  if (t.includes('أفضل')) return 'قائمة أدوات';
  return 'مقال';
}

/* بناء صورة البطاقة */
function buildCardImg(post, title, large) {
  const src = post.featuredImage || post.image;
  if (src) {
    return `<img src="${escapeHTML(src)}" alt="${title}" loading="${large ? 'eager' : 'lazy'}" />`;
  }
  return smartArt(post);
}

async function loadPosts() {
  try {
    const res = await fetch('/posts-index.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('no index');
    const posts = await res.json();
    renderPosts(Array.isArray(posts) ? posts : []);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }
}

function renderPosts(posts) {
  document.getElementById('loading').style.display = 'none';
  if (!posts || posts.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }

  const sorted = [...posts].sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
  const featured = sorted.find(p => p.featured || p.editorsPick) || sorted[0];
  const rest = sorted.filter(p => p !== featured);

  document.getElementById('blog-content').style.display = 'block';
  document.getElementById('posts-count').textContent = `${sorted.length} مقال`;

  /* ── Featured ── */
  if (featured) {
    const featuredTitle = escapeHTML(featured.title || 'مقال مميز');
    document.getElementById('featured-section').style.display = 'block';
    document.getElementById('featured-card').href = `/blog/${encodeURIComponent(featured.slug || '')}`;
    document.getElementById('featured-title').textContent = featured.title || '';
    document.getElementById('featured-desc').textContent = featured.description || '';

    const dateStr = formatDate(featured.date, {year:'numeric', month:'long', day:'numeric'});
    document.getElementById('featured-meta').innerHTML = [
      dateStr ? `<span>📅 ${dateStr}</span>` : '',
      `<span>⏱ ${estimateReadingMinutes(featured)} دقائق قراءة</span>`
    ].filter(Boolean).join('');

    document.getElementById('featured-img').innerHTML = buildCardImg(featured, featuredTitle, true);
  }

  /* ── Grid ── */
  const grid = document.getElementById('posts-grid');
  grid.innerHTML = rest.map((post, i) => {
    const title = escapeHTML(post.title || 'مقال على NEORA');
    const desc = escapeHTML(post.description || '');
    const slug = encodeURIComponent(post.slug || '');
    const dateStr = formatDate(post.date, {year:'numeric', month:'short', day:'numeric'});
    const cat = escapeHTML(getCategory(post));
    const mins = estimateReadingMinutes(post);

    return `
      <a href="/blog/${slug}" class="post-card" aria-label="${title}">
        <div class="card-img">
          ${buildCardImg(post, title, false)}
          <span class="card-category-badge">${cat}</span>
        </div>
        <div class="card-body">
          <div class="card-meta">
            ${dateStr ? `<span class="card-date">${dateStr}</span>` : ''}
            <span class="card-date">⏱ ${mins} د</span>
            ${getBadge(post, i)}
          </div>
          <div class="card-title">${title}</div>
          <div class="card-desc">${desc}</div>
          <div class="card-read">اقرأ المقال</div>
        </div>
      </a>`;
  }).join('');
}

loadPosts();
</script>
</body>
</html>
