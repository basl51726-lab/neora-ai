<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المدونة — NEORA</title>
  <meta name="description" content="مقالات ودليل شامل حول أدوات الذكاء الاصطناعي" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fafaf8;
      color: #0f0f0f;
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(212,175,55,0.25);
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
      box-shadow: 0 1px 20px rgba(212,175,55,0.08);
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 900;
      text-decoration: none;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg,#b8962e,#d4af37,#9a7d24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a {
      color: #334155;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: #b8962e; }

    .hero {
      text-align: center;
      padding: 4rem 2rem 3rem;
      background: linear-gradient(180deg,#fffdf5 0%,#fafaf8 100%);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(212,175,55,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero h1 {
      font-size: 2.5rem;
      font-weight: 900;
      color: #0f0f0f;
      margin-bottom: 1rem;
    }
    .hero h1 span {
      background: linear-gradient(135deg,#b8962e,#d4af37,#9a7d24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p { color: #475569; font-size: 1rem; font-weight: 600; }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .post-card {
      background: #ffffff;
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 16px;
      padding: 1.5rem;
      transition: all 0.3s;
      text-decoration: none;
      color: inherit;
      display: block;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      position: relative;
      overflow: hidden;
    }
    .post-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);
    }
    .post-card:hover {
      border-color: rgba(212,175,55,0.5);
      background: #fffdf5;
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(212,175,55,0.15);
    }
    .post-date { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.75rem; font-weight: 600; }
    .post-title { font-size: 1.1rem; font-weight: 800; color: #b8962e; margin-bottom: 0.75rem; line-height: 1.5; }
    .post-desc { font-size: 0.85rem; color: #334155; line-height: 1.7; font-weight: 500; }
    .post-read { margin-top: 1rem; font-size: 0.8rem; color: #b8962e; font-weight: 700; }

    .empty { text-align: center; padding: 4rem 2rem; color: #94a3b8; }
    .empty h2 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #64748b; }
    #loading { text-align: center; padding: 3rem; color: #94a3b8; }

    footer {
      text-align: center;
      padding: 2rem;
      margin-top: 4rem;
      border-top: 1px solid rgba(212,175,55,0.15);
      color: #94a3b8;
      font-size: 0.85rem;
      background: #fff;
    }
    footer a { color: #b8962e; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">NEORA</a>
  <ul class="nav-links">
    <li><a href="/">الرئيسية</a></li>
    <li><a href="/blog" class="active">المدونة</a></li>
    <li><a href="/#tools-section">الأدوات</a></li>
  </ul>
</nav>

<div class="hero">
  <h1>مدونة <span>NEORA</span></h1>
  <p>أحدث المقالات حول أدوات الذكاء الاصطناعي والتقنية</p>
</div>

<div class="container">
  <div id="loading">جاري تحميل المقالات...</div>
  <div class="posts-grid" id="posts-grid" style="display:none"></div>
  <div class="empty" id="empty" style="display:none">
    <h2>لا توجد مقالات بعد</h2>
    <p>سيتم نشر المقالات قريباً</p>
  </div>
</div>

<footer>
  <a href="/">NEORA</a> — دليل شامل لأقوى أدوات الذكاء الاصطناعي
</footer>

<script>
async function loadPosts() {
  try {
    const res = await fetch('/posts-index.json');
    if (!res.ok) throw new Error('no index');
    const posts = await res.json();
    renderPosts(posts);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }
}
function renderPosts(posts) {
  document.getElementById('loading').style.display = 'none';
  if (!posts || posts.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }
  const grid = document.getElementById('posts-grid');
  grid.style.display = 'grid';
  grid.innerHTML = posts.map(post => `
    <a href="/blog/${post.slug}" class="post-card">
      <div class="post-date">${post.date || ''}</div>
      <div class="post-title">${post.title}</div>
      <div class="post-desc">${post.description || ''}</div>
      <div class="post-read">اقرأ المقال ←</div>
    </a>
  `).join('');
}
loadPosts();
</script>
</body>
</html>
