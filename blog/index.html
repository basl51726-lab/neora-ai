<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المدونة — NEORA</title>
  <meta name="description" content="أحدث المقالات حول أدوات الذكاء الاصطناعي والتقنية" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fafaf8; color: #0f0f0f; font-family: 'Cairo', sans-serif; min-height: 100vh; }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid rgba(212,175,55,0.25);
      position: sticky; top: 0; background: rgba(255,255,255,0.97);
      backdrop-filter: blur(10px); z-index: 100;
      box-shadow: 0 1px 20px rgba(212,175,55,0.08);
    }
    .logo {
      font-size: 1.5rem; font-weight: 900; text-decoration: none; letter-spacing: 0.1em;
      background: linear-gradient(135deg,#b8962e,#d4af37,#9a7d24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { color: #334155; text-decoration: none; font-size: 0.9rem; font-weight: 700; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #b8962e; }

    /* HERO */
    .hero {
      text-align: center; padding: 3.5rem 2rem 2.5rem;
      background: linear-gradient(180deg,#fffdf5 0%,#fafaf8 100%);
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 300px;
      background: radial-gradient(ellipse, rgba(212,175,55,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3);
      padding: 5px 16px; border-radius: 50px; font-size: 0.8rem;
      color: #9a7d24; font-weight: 700; margin-bottom: 1rem;
    }
    .hero h1 { font-size: 2.2rem; font-weight: 900; color: #0f0f0f; margin-bottom: 0.75rem; }
    .hero h1 span { background: linear-gradient(135deg,#b8962e,#d4af37,#9a7d24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: #475569; font-size: 1rem; font-weight: 600; }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* FEATURED ARTICLE */
    .featured-section { margin-bottom: 3rem; }
    .featured-label { font-size: 0.75rem; font-weight: 800; color: #9a7d24; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
    .featured-label::after { content: ''; flex: 1; height: 1px; background: rgba(212,175,55,0.2); }

    .featured-card {
      background: #fff; border: 1px solid rgba(212,175,55,0.25); border-radius: 20px;
      overflow: hidden; display: grid; grid-template-columns: 1fr 1fr;
      box-shadow: 0 4px 24px rgba(212,175,55,0.1); transition: all 0.3s;
      text-decoration: none; color: inherit; position: relative;
    }
    .featured-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #d4af37, #b8962e); }
    .featured-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(212,175,55,0.18); border-color: rgba(212,175,55,0.4); }

    .featured-img {
      background: linear-gradient(135deg, #fffdf0, #fef9e7);
      min-height: 260px; display: flex; align-items: center; justify-content: center;
      font-size: 5rem; border-left: 1px solid rgba(212,175,55,0.15);
      position: relative; overflow: hidden;
    }
    .featured-img img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .featured-img .placeholder { font-size: 4rem; opacity: 0.4; }

    .featured-body { padding: 2rem 2rem 1.75rem; display: flex; flex-direction: column; justify-content: center; }
    .featured-tag { display: inline-block; background: rgba(212,175,55,0.12); color: #9a7d24; font-size: 0.72rem; font-weight: 800; padding: 3px 12px; border-radius: 50px; margin-bottom: 1rem; }
    .featured-title { font-size: 1.4rem; font-weight: 900; color: #0f0f0f; line-height: 1.5; margin-bottom: 0.75rem; }
    .featured-desc { font-size: 0.9rem; color: #475569; line-height: 1.8; margin-bottom: 1.25rem; font-weight: 500; }
    .featured-meta { font-size: 0.75rem; color: #94a3b8; font-weight: 600; margin-bottom: 1.25rem; }
    .featured-cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg,#d4af37,#b8962e); color: #fff;
      padding: 10px 22px; border-radius: 10px; font-size: 0.85rem; font-weight: 800;
      text-decoration: none; transition: opacity 0.2s; width: fit-content;
    }
    .featured-cta:hover { opacity: 0.88; }

    /* GRID SECTION */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .section-label { font-size: 0.75rem; font-weight: 800; color: #9a7d24; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
    .section-count { font-size: 0.75rem; color: #94a3b8; font-weight: 600; }

    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }

    .post-card {
      background: #ffffff; border: 1px solid rgba(212,175,55,0.18);
      border-radius: 16px; overflow: hidden; transition: all 0.3s;
      text-decoration: none; color: inherit; display: flex; flex-direction: column;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04); position: relative;
    }
    .post-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent); }
    .post-card:hover { border-color: rgba(212,175,55,0.45); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(212,175,55,0.14); }

    .card-img {
      height: 180px; background: linear-gradient(135deg,#fffdf0,#fef9e7);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; position: relative; overflow: hidden;
      border-bottom: 1px solid rgba(212,175,55,0.1);
    }
    .card-img img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .card-img .emoji-placeholder { opacity: 0.35; font-size: 3.5rem; }

    .card-body { padding: 1.25rem 1.25rem 1rem; flex: 1; display: flex; flex-direction: column; }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 0.6rem; }
    .card-date { font-size: 0.72rem; color: #94a3b8; font-weight: 600; }
    .card-badge { font-size: 0.65rem; font-weight: 800; padding: 2px 8px; border-radius: 50px; }
    .badge-new { background: rgba(212,175,55,0.12); color: #9a7d24; }
    .badge-popular { background: rgba(239,68,68,0.08); color: #dc2626; }
    .badge-updated { background: rgba(16,185,129,0.08); color: #059669; }

    .card-title { font-size: 1rem; font-weight: 800; color: #0f0f0f; line-height: 1.5; margin-bottom: 0.6rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-desc { font-size: 0.82rem; color: #475569; line-height: 1.7; font-weight: 500; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-read { margin-top: 0.85rem; font-size: 0.78rem; color: #b8962e; font-weight: 800; display: flex; align-items: center; gap: 4px; }

    /* STATES */
    .empty { text-align: center; padding: 4rem 2rem; color: #94a3b8; }
    .empty h2 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #64748b; }
    #loading { text-align: center; padding: 3rem; color: #94a3b8; font-size: 1rem; }

    footer { text-align: center; padding: 2rem; margin-top: 4rem; border-top: 1px solid rgba(212,175,55,0.15); color: #94a3b8; font-size: 0.85rem; background: #fff; }
    footer a { color: #b8962e; text-decoration: none; font-weight: 700; }

    /* MOBILE */
    @media (max-width: 768px) {
      .featured-card { grid-template-columns: 1fr; }
      .featured-img { min-height: 200px; border-left: none; border-bottom: 1px solid rgba(212,175,55,0.15); }
      .featured-body { padding: 1.5rem; }
      .featured-title { font-size: 1.15rem; }
      .hero h1 { font-size: 1.7rem; }
      nav { padding: 1rem; }
      .posts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">NEORA</a>
  <ul class="nav-links">
    <li><a href="/">الرئيسية</a></li>
    <li><a href="/blog" class="active">المدونة</a></li>
    <li><a href="/#tools-section">الأدوات</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-badge">✦ المدونة</div>
  <h1>مدونة <span>NEORA</span></h1>
  <p>أحدث المقالات حول أدوات الذكاء الاصطناعي والتقنية</p>
</div>

<div class="container">
  <div id="loading">⏳ جاري تحميل المقالات...</div>

  <div id="blog-content" style="display:none">
    <!-- Featured -->
    <div class="featured-section" id="featured-section" style="display:none">
      <div class="featured-label">⭐ المقال المميز</div>
      <a href="#" class="featured-card" id="featured-card">
        <div class="featured-img" id="featured-img">
          <span class="placeholder">🤖</span>
        </div>
        <div class="featured-body">
          <span class="featured-tag">مقال مميز</span>
          <div class="featured-title" id="featured-title"></div>
          <div class="featured-desc" id="featured-desc"></div>
          <div class="featured-meta" id="featured-meta"></div>
          <span class="featured-cta">اقرأ المقال ←</span>
        </div>
      </a>
    </div>

    <!-- Grid -->
    <div class="section-header">
      <div class="section-label">📚 جميع المقالات</div>
      <div class="section-count" id="posts-count"></div>
    </div>
    <div class="posts-grid" id="posts-grid"></div>
  </div>

  <div class="empty" id="empty" style="display:none">
    <h2>لا توجد مقالات بعد</h2>
    <p>سيتم نشر المقالات قريباً</p>
  </div>
</div>

<footer>
  <a href="/">NEORA</a> — دليل شامل لأقوى أدوات الذكاء الاصطناعي
</footer>

<script>
function getEmoji(title) {
  if (!title) return '📝';
  const t = title.toLowerCase();
  if (t.includes('صور') || t.includes('image')) return '🎨';
  if (t.includes('فيديو') || t.includes('video')) return '🎬';
  if (t.includes('كود') || t.includes('برمج')) return '💻';
  if (t.includes('صوت') || t.includes('موسيق')) return '🎵';
  if (t.includes('chatgpt') || t.includes('دردش')) return '🤖';
  if (t.includes('يوتيوب') || t.includes('youtube')) return '▶️';
  if (t.includes('تسويق') || t.includes('market')) return '📈';
  if (t.includes('بحث') || t.includes('research')) return '🔬';
  if (t.includes('طلاب') || t.includes('تعلم')) return '📚';
  if (t.includes('مجاني') || t.includes('free')) return '🆓';
  return '🧠';
}

function getBadge(post, index) {
  if (index === 0) return '';
  const date = new Date(post.date);
  const now = new Date();
  const daysDiff = (now - date) / (1000 * 60 * 60 * 24);
  if (daysDiff < 7) return '<span class="card-badge badge-new">جديد</span>';
  if (index <= 3) return '<span class="card-badge badge-popular">🔥 شائع</span>';
  return '';
}

async function loadPosts() {
  try {
    const res = await fetch('/posts-index.json');
    if (!res.ok) throw new Error('no index');
    const posts = await res.json();
    renderPosts(posts);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }
}

function renderPosts(posts) {
  document.getElementById('loading').style.display = 'none';
  if (!posts || posts.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }

  document.getElementById('blog-content').style.display = 'block';
  document.getElementById('posts-count').textContent = `${posts.length} مقال`;

  // Featured
  const featured = posts[0];
  if (featured) {
    document.getElementById('featured-section').style.display = 'block';
    document.getElementById('featured-card').href = `/blog/${featured.slug}`;
    document.getElementById('featured-title').textContent = featured.title;
    document.getElementById('featured-desc').textContent = featured.description || '';
    document.getElementById('featured-meta').textContent = featured.date ? `📅 ${featured.date}` : '';
    const featImg = document.getElementById('featured-img');
    if (featured.featuredImage) {
      featImg.innerHTML = `<img src="${featured.featuredImage}" alt="${featured.title}" />`;
    } else {
      featImg.innerHTML = `<span class="placeholder">${getEmoji(featured.title)}</span>`;
    }
  }

  // Grid (skip first)
  const rest = posts.slice(1);
  const grid = document.getElementById('posts-grid');
  grid.innerHTML = rest.map((post, i) => {
    const imgHTML = post.featuredImage
      ? `<img src="${post.featuredImage}" alt="${post.title}" />`
      : `<span class="emoji-placeholder">${getEmoji(post.title)}</span>`;
    return `
      <a href="/blog/${post.slug}" class="post-card">
        <div class="card-img">${imgHTML}</div>
        <div class="card-body">
          <div class="card-meta">
            <span class="card-date">${post.date || ''}</span>
            ${getBadge(post, i)}
          </div>
          <div class="card-title">${post.title}</div>
          <div class="card-desc">${post.description || ''}</div>
          <div class="card-read">اقرأ المقال ←</div>
        </div>
      </a>`;
  }).join('');
}

loadPosts();
</script>
</body>
</html>
