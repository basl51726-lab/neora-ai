<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">مقال — NEORA</title>
  <meta name="description" id="meta-desc" content="" />
  <meta property="og:title" id="og-title" content="" />
  <meta property="og:description" id="og-desc" content="" />
  <link id="canonical" rel="canonical" href="" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fafaf8; color: #0f0f0f; font-family: 'Cairo', sans-serif; min-height: 100vh; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid rgba(212,175,55,0.25);
      position: sticky; top: 0; background: rgba(255,255,255,0.97);
      backdrop-filter: blur(10px); z-index: 100;
      box-shadow: 0 1px 20px rgba(212,175,55,0.08);
    }
    .logo {
      font-size: 1.5rem; font-weight: 900; text-decoration: none; letter-spacing: 0.1em;
      background: linear-gradient(135deg,#b8962e,#d4af37,#9a7d24);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-back {
      color: #b8962e; text-decoration: none; font-size: 0.88rem; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
      background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.2);
      padding: 6px 14px; border-radius: 8px; transition: all 0.2s;
    }
    .nav-back:hover { background: rgba(212,175,55,0.14); }
    .page-wrap { max-width: 860px; margin: 0 auto; padding: 2.5rem 2rem 6rem; }
    .loading { text-align: center; padding: 6rem 2rem; color: #94a3b8; font-size: 1.1rem; }
    .error-box { text-align: center; padding: 6rem 2rem; }
    .error-box h2 { color: #0f0f0f; margin-bottom: 1rem; }
    .error-box p { color: #475569; margin-bottom: 2rem; }
    .error-box a { color: #b8962e; text-decoration: none; font-weight: 700; }
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: #94a3b8; margin-bottom: 2rem;
    }
    .breadcrumb a { color: #b8962e; text-decoration: none; font-weight: 700; }
    .breadcrumb span { color: #cbd5e1; }

    /* HERO */
    .post-hero-wrap {
      width: 100%; border-radius: 18px; overflow: hidden; margin-bottom: 2rem;
      border: 1px solid rgba(212,175,55,0.15);
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, #1a1a1a 60%, #111111 100%);
      aspect-ratio: 16/8; position: relative;
    }

    /* صورة حقيقية من المقال */
    .post-hero-real {
      position: absolute; inset: 0;
    }
    .post-hero-real img {
      width: 100%; height: 100%; object-fit: cover;
    }

    /* لوغو أداة */
    .post-hero-logo {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .post-hero-logo::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(212,175,55,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,175,55,0.06) 1px, transparent 1px);
      background-size: 34px 34px;
    }
    .post-hero-logo img {
      width: 42%; max-width: 300px; height: auto; object-fit: contain;
      position: relative; z-index: 2;
      filter: drop-shadow(0 4px 28px rgba(212,175,55,0.4));
      transition: transform 0.3s ease;
    }
    .post-hero-logo img:hover { transform: scale(1.04); }

    /* Smart art fallback */
    .post-hero-art {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(circle at 18% 20%, rgba(212,175,55,0.30), transparent 28%),
        radial-gradient(circle at 80% 75%, rgba(184,150,46,0.22), transparent 30%),
        linear-gradient(135deg, #121107 0%, #25200f 55%, #0f0f0b 100%);
      overflow: hidden; padding: 2rem;
    }
    .post-hero-art::before {
      content: ''; position: absolute; inset: -35%; opacity: 0.12;
      background-image: linear-gradient(rgba(212,175,55,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,175,55,0.5) 1px, transparent 1px);
      background-size: 34px 34px; transform: rotate(-8deg);
    }
    .post-hero-art-inner { position: relative; z-index: 2; text-align: center; color: #fff8dc; }
    .post-hero-art-mark {
      width: 94px; height: 94px; border-radius: 28px; display: grid; place-items: center;
      margin: 0 auto 1rem; font-size: 2.8rem;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(212,175,55,0.35);
      box-shadow: 0 12px 36px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .post-hero-art-title { font-size: 1.25rem; font-weight: 900; line-height: 1.6; max-width: 620px; }

    .post-category {
      display: inline-block; background: rgba(212,175,55,0.1); color: #9a7d24;
      font-size: 0.7rem; font-weight: 800; padding: 3px 12px; border-radius: 50px;
      margin-bottom: 0.8rem; letter-spacing: 0.5px;
    }
    .post-title { font-size: 2rem; font-weight: 900; color: #0f0f0f; line-height: 1.45; margin-bottom: 1rem; }
    .post-meta {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      color: #94a3b8; font-size: 0.8rem; font-weight: 600;
      margin-bottom: 2rem; padding-bottom: 1.5rem;
      border-bottom: 2px solid rgba(212,175,55,0.12);
    }
    .meta-item { display: flex; align-items: center; gap: 5px; }
    .meta-divider { color: rgba(212,175,55,0.3); }
    #reading-progress {
      position: fixed; top: 0; left: 0; right: 0; height: 3px; z-index: 200;
      background: linear-gradient(90deg, #d4af37, #b8962e);
      transform-origin: left; transform: scaleX(0); transition: transform 0.1s linear;
    }
    .post-body { font-size: 1.06rem; line-height: 2.05; color: #334155; }
    .post-body h2 { font-size: 1.5rem; font-weight: 900; color: #b8962e; margin: 2.75rem 0 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid rgba(212,175,55,0.15); }
    .post-body h3 { font-size: 1.18rem; font-weight: 800; color: #0f0f0f; margin: 2rem 0 0.75rem; }
    .post-body p { margin-bottom: 1.35rem; }
    .post-body ul, .post-body ol { padding-right: 1.5rem; margin-bottom: 1.25rem; }
    .post-body li { margin-bottom: 0.65rem; }
    .post-body a { color: #b8962e; text-decoration: underline; }
    .post-body strong { color: #0f0f0f; font-weight: 800; }
    .post-body hr { border: none; border-top: 1px solid rgba(212,175,55,0.2); margin: 2rem 0; }
    .post-body blockquote { border-right: 4px solid #d4af37; padding: 1rem 1.5rem; background: rgba(212,175,55,0.06); border-radius: 0 12px 12px 0; margin: 1.5rem 0; color: #475569; font-style: italic; }
    .post-body code { background: rgba(212,175,55,0.1); padding: 2px 7px; border-radius: 5px; font-family: monospace; font-size: 0.9rem; color: #9a7d24; }
    .post-body pre { background: #f8f5ee; padding: 1.25rem; border-radius: 12px; overflow-x: auto; margin: 1.5rem 0; border: 1px solid rgba(212,175,55,0.2); }
    .post-body pre code { background: none; color: #334155; padding: 0; }
    .post-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; border-radius: 10px; overflow: hidden; }
    .post-body th { background: rgba(212,175,55,0.12); color: #b8962e; padding: 12px 16px; text-align: right; font-weight: 800; border-bottom: 2px solid rgba(212,175,55,0.25); }
    .post-body td { padding: 11px 16px; border-bottom: 1px solid rgba(212,175,55,0.1); }
    .post-body tr:hover td { background: rgba(212,175,55,0.04); }
    .post-body img { max-width: 100%; border-radius: 12px; margin: 1rem 0; border: 1px solid rgba(212,175,55,0.1); }
    .post-footer { margin-top: 3.5rem; padding-top: 2rem; border-top: 1px solid rgba(212,175,55,0.2); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #b8962e; text-decoration: none; font-weight: 800; font-size: 0.88rem; background: rgba(212,175,55,0.08); padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(212,175,55,0.2); transition: all 0.2s; }
    .back-btn:hover { background: rgba(212,175,55,0.15); }
    .share-actions { display: flex; align-items: center; gap: 10px; }
    .share-btn { font-size: 0.78rem; color: #64748b; cursor: pointer; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); padding: 7px 14px; border-radius: 8px; transition: all 0.2s; font-family: inherit; font-weight: 700; }
    .share-btn:hover { background: rgba(212,175,55,0.1); border-color: rgba(212,175,55,0.25); color: #b8962e; }
    footer { text-align: center; padding: 2rem; margin-top: 2rem; border-top: 1px solid rgba(212,175,55,0.15); color: #94a3b8; font-size: 0.85rem; background: #fff; }
    footer a { color: #b8962e; text-decoration: none; font-weight: 700; }
    @media (max-width: 768px) {
      .page-wrap { padding: 1.5rem 1rem 4rem; }
      .post-title { font-size: 1.5rem; }
      .post-body { font-size: 0.97rem; }
      nav { padding: 1rem; }
      .post-hero-wrap { aspect-ratio: 16/9; }
      .post-hero-logo img { width: 55%; }
    }
  </style>
</head>
<body>

<div id="reading-progress"></div>
<nav>
  <a href="/" class="logo">NEORA</a>
  <a href="/blog" class="nav-back">← المدونة</a>
</nav>

<div class="page-wrap">
  <div class="loading" id="loading">⏳ جاري تحميل المقال...</div>
  <div class="error-box" id="error-box" style="display:none;">
    <h2>😕 المقال غير موجود</h2>
    <p>تعذّر تحميل هذا المقال.</p>
    <a href="/blog">← العودة للمدونة</a>
  </div>
  <div id="post-content" style="display:none;">
    <div class="breadcrumb">
      <a href="/">NEORA</a><span>›</span>
      <a href="/blog">المدونة</a><span>›</span>
      <span id="breadcrumb-title"></span>
    </div>
    <div class="post-hero-wrap" id="hero-wrap"></div>
    <div class="post-category" id="post-category">مقال</div>
    <h1 class="post-title" id="post-title-el"></h1>
    <div class="post-meta" id="post-meta"></div>
    <div class="post-body" id="post-body"></div>
    <div class="post-footer">
      <a href="/blog" class="back-btn">← اقرأ المزيد</a>
      <div class="share-actions">
        <button class="share-btn" onclick="copyLink()">🔗 نسخ الرابط</button>
        <button class="share-btn" onclick="shareTwitter()">𝕏 مشاركة</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="/">NEORA</a> — دليل شامل لأقوى أدوات الذكاء الاصطناعي
</footer>

<script>
window.addEventListener('scroll', () => {
  const el = document.getElementById('reading-progress');
  if (!el) return;
  const total = document.body.scrollHeight - window.innerHeight;
  el.style.transform = `scaleX(${total > 0 ? window.scrollY / total : 0})`;
});

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.activeElement;
    const orig = btn.textContent;
    btn.textContent = '✅ تم النسخ';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
function shareTwitter() {
  const title = document.getElementById('post-title-el').textContent;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(window.location.href)}`, '_blank', 'noopener');
}
function escapeHTML(v) {
  const m = {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'};
  return String(v || '').replace(/[&<>'"]/g, c => m[c]);
}

/* لوغو مطابق فقط للأدوات المذكورة بالاسم */
function getPostLogo(title) {
  const t = String(title || '').toLowerCase();
  if (t.includes('lovable') && t.includes('bolt'))               return '/blog/lovable-wordmark-light.svg';
  if (t.includes('windsurf') && t.includes('cursor'))            return '/blog/Cursor_logo.svg';
  if (t.includes('chatgpt') && t.includes('claude') && t.includes('gemini')) return '/blog/Claude_AI_logo.svg';
  if (t.includes('lovable') && !t.includes('أفضل'))              return '/blog/lovable-wordmark-light.svg';
  if (t.includes('bolt') && !t.includes('أفضل'))                 return '/blog/bolt-logo.png';
  if (t.includes('cursor') && !t.includes('أفضل'))               return '/blog/Cursor_logo.svg';
  if (t.includes('windsurf') && !t.includes('أفضل'))             return '/blog/Cursor_logo.svg';
  if (t.includes('notebooklm'))                                  return '/blog/Gemini_Advanced_logo.svg';
  if (t.includes('chatgpt') && !t.includes('أفضل'))              return '/blog/ChatGPT-Logo.svg';
  if (t.includes('claude') && !t.includes('أفضل'))               return '/blog/Claude_AI_logo.svg';
  if (t.includes('gemini') && !t.includes('أفضل'))               return '/blog/Gemini_Advanced_logo.svg';
  if (t.includes('perplexity') && !t.includes('أفضل'))           return '/blog/Perplexity_AI_logo.svg';
  return null;
}

/* smart art للمقالات العامة */
function getSmartArt(title) {
  const t = String(title || '').toLowerCase();
  if (t.includes('يوتيوب') || t.includes('youtube')) return { icon: '▶️', label: 'محتوى يوتيوب بالذكاء الاصطناعي' };
  if (t.includes('صور') || t.includes('image'))      return { icon: '🎨', label: 'أدوات توليد الصور' };
  if (t.includes('فيديو') || t.includes('video'))    return { icon: '🎬', label: 'أدوات توليد الفيديو' };
  if (t.includes('مواقع') || t.includes('تطبيق'))   return { icon: '🚀', label: 'أدوات بناء المواقع' };
  if (t.includes('برمج') || t.includes('كود') || t.includes('devin')) return { icon: '💻', label: 'أدوات البرمجة' };
  if (t.includes('بحث') || t.includes('علمي'))       return { icon: '🔬', label: 'أدوات البحث العلمي' };
  if (t.includes('طلاب'))                             return { icon: '📚', label: 'أدوات الطلاب' };
  if (t.includes('تسويق'))                            return { icon: '📈', label: 'أدوات التسويق الرقمي' };
  return { icon: '✦', label: 'أدوات الذكاء الاصطناعي' };
}

/* بناء الهيرو — الأولوية: صورة حقيقية ← لوغو ← smart art */
function buildHero(title, realImg) {
  // 1. صورة حقيقية من الـ CMS
  if (realImg) {
    return `<div class="post-hero-real"><img src="${escapeHTML(realImg)}" alt="${escapeHTML(title)}" /></div>`;
  }
  // 2. لوغو مطابق للأداة
  const logo = getPostLogo(title);
  if (logo) {
    return `<div class="post-hero-logo"><img src="${escapeHTML(logo)}" alt="${escapeHTML(title)}" /></div>`;
  }
  // 3. smart art
  const art = getSmartArt(title);
  return `<div class="post-hero-art">
    <div class="post-hero-art-inner">
      <div class="post-hero-art-mark">${art.icon}</div>
      <div class="post-hero-art-title">${art.label}</div>
    </div>
  </div>`;
}

/* استخراج الصورة من كل الحقول الممكنة */
function extractImage(data) {
  // كل الأسماء التي يستخدمها Netlify CMS
  return data.featuredImage
      || data.featured_image
      || data.image
      || data.thumbnail
      || data.cover
      || data.hero
      || null;
}

(async () => {
  const slugFromURL = decodeURIComponent(
    window.location.pathname.replace(/^\/blog\//, '').replace(/\/+$/, '').trim()
  );
  if (!slugFromURL) { showError(); return; }

  try {
    const res = await fetch(`/_posts-json/${slugFromURL}.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const title = data.title || 'مقال على NEORA';
    document.title = `${title} — NEORA`;
    document.getElementById('canonical').href = window.location.href;
    setMeta('meta-desc', data.description || '');
    setMeta('og-title', title);
    setMeta('og-desc', data.description || '');

    if (data.category) document.getElementById('post-category').textContent = data.category;
    document.getElementById('post-title-el').textContent = title;
    document.getElementById('breadcrumb-title').textContent = title.length > 40 ? title.slice(0,40)+'…' : title;

    const d = data.date ? new Date(data.date) : null;
    const dateStr = d ? d.toLocaleDateString('ar-SA', {year:'numeric', month:'long', day:'numeric'}) : '';
    const words = (data.content || '').split(/\s+/).length;
    const mins = Math.max(2, Math.round(words / 200));
    document.getElementById('post-meta').innerHTML = [
      dateStr ? `<span class="meta-item">📅 ${dateStr}</span>` : '',
      '<span class="meta-divider">·</span>',
      `<span class="meta-item">⏱ ${mins} دقيقة قراءة</span>`,
      data.author ? `<span class="meta-divider">·</span><span class="meta-item">✍ ${data.author}</span>` : ''
    ].filter(Boolean).join('');

    // استخراج الصورة من كل الحقول الممكنة
    const imgSrc = extractImage(data);
    document.getElementById('hero-wrap').innerHTML = buildHero(title, imgSrc);

    marked.setOptions({ breaks: true, gfm: true });
    document.getElementById('post-body').innerHTML = marked.parse(data.content || '');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('post-content').style.display = 'block';

  } catch(e) {
    console.error(e);
    showError();
  }
})();

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-box').style.display = 'block';
}
function setMeta(id, val) {
  if (!val) return;
  const el = document.getElementById(id);
  if (el) el.setAttribute('content', val);
}
</script>
</body>
</html>
