<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEORA CMS — Admin</title>
  <style>
    #cms-loading {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #cms-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin-bottom: 1.5rem;
    }
    .logo span { color: #6c63ff; }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(108,99,255,0.2);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #cms-loading p {
      color: #666;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div id="cms-loading">
    <div class="logo">NE<span>O</span>RA</div>
    <div class="spinner"></div>
    <p>Loading CMS...</p>
  </div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    (function () {
      var hash = window.location.hash || '';

      function getToken(key) {
        var match = hash.match(new RegExp('[#&]' + key + '=([^&]*)'));
        return match ? decodeURIComponent(match[1]) : null;
      }

      var inviteToken = getToken('invite_token');
      var recoveryToken = getToken('recovery_token');
      var confirmToken = getToken('confirmation_token');

      function handleToken() {
        var netlifyIdentity = window.netlifyIdentity;
        if (!netlifyIdentity) return;

        if (inviteToken) {
          netlifyIdentity.open('invite');
          netlifyIdentity.on('init', function (user) {
            if (!user) netlifyIdentity.open('invite');
          });

        } else if (recoveryToken) {
          netlifyIdentity.open('recovery');
          netlifyIdentity.on('init', function (user) {
            if (!user) netlifyIdentity.open('recovery');
          });

        } else if (confirmToken) {
          netlifyIdentity.on('init', function (user) {
            if (user) netlifyIdentity.refresh();
          });
        }
      }

      window.netlifyIdentity &&
      window.netlifyIdentity.on('login', function () {
        setTimeout(function () {
          window.location.hash = '';
        }, 200);
      });

      var loading = document.getElementById('cms-loading');

      document.addEventListener('CMS_LOAD', function () {
        if (loading) loading.classList.add('hidden');
      });

      setTimeout(function () {
        if (loading) loading.classList.add('hidden');
      }, 4000);

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', handleToken);
      } else {
        handleToken();
      }
    })();
  </script>

</body>
</html>
