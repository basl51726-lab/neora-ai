backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: tools
    label: "الأدوات"
    folder: "_tools"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "اسم الأداة", name: "title", widget: "string"}
      - {label: "الرابط الرسمي", name: "url", widget: "string"}
      - {label: "رابط Affiliate", name: "affiliate_url", widget: "string", required: false}
      - label: "التصنيف"
        name: category
        widget: "select"
        options:
          - {label: "دردشة AI", value: "chat"}
          - {label: "توليد الصور", value: "image"}
          - {label: "توليد الفيديو", value: "video"}
          - {label: "مساعدي الكود", value: "code"}
          - {label: "أدوات الكتابة", value: "writing"}
          - {label: "أدوات الصوت", value: "voice"}
          - {label: "الإنتاجية", value: "productivity"}
          - {label: "البحث والتحليل", value: "research"}
      - label: "الشارة"
        name: badge
        widget: "select"
        options:
          - {label: "مجاني", value: "free"}
          - {label: "احترافي", value: "pro"}
          - {label: "جديد", value: "new"}
      - {label: "التقييم", name: "rating", widget: "number", min: 1, max: 5, step: 0.1}
      - label: "الأيقونة"
        name: "icon"
        widget: "image"
        required: false
        hint: "ارفع أيقونة الأداة (PNG أو SVG أو WebP، مربعة، 128×128 على الأقل). إذا تركته فارغاً يظهر رمز افتراضي."
      - label: "إيموجي احتياطي"
        name: "icon_emoji"
        widget: "string"
        required: false
        hint: "إيموجي يظهر إذا لم ترفع أيقونة — مثال: 🤖"
        default: "🤖"
      - {label: "الوصف عربي", name: "desc_ar", widget: "text"}
      - {label: "الوصف إنجليزي", name: "desc_en", widget: "text"}
      - {label: "السعر", name: "pricing_ar", widget: "string"}

  - name: blog
    label: "المدونة"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "العنوان", name: "title", widget: "string"}
      - {label: "التاريخ", name: "date", widget: "datetime"}
      - {label: "الوصف", name: "description", widget: "text"}
      - label: "صورة المقال"
        name: "featuredImage"
        widget: "image"
        required: false
        hint: "ارفع صورة المقال (أفضل أبعاد: 1200×630 بكسل)"
      - label: "تصنيف المقال"
        name: "category"
        widget: "select"
        required: false
        options:
          - "مقال"
          - "مقارنة"
          - "دليل"
          - "مراجعة"
          - "تحليل"
      - label: "مقال مميز"
        name: "featured"
        widget: "boolean"
        default: false
        required: false
      - {label: "المحتوى", name: "body", widget: "markdown"}

  - name: affiliates
    label: "روابط Affiliate"
    folder: "_affiliates"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "اسم الأداة", name: "title", widget: "string"}
      - {label: "رابط Affiliate", name: "affiliate_url", widget: "string"}
      - {label: "العمولة", name: "commission", widget: "string"}
      - {label: "الوصف", name: "description", widget: "text"}
