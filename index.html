<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="/neora-i18n.js"></script>

  <!-- SEO: Updated dynamically by i18n engine -->
  <title>نيورا — اكتشف أفضل أدوات الذكاء الاصطناعي</title>
  <meta name="description" content="دليل متميز لأدوات الذكاء الاصطناعي — مراجعات ومقارنات وتصنيفات لأكثر من 70 أداة."/>
  <meta property="og:title"       content="نيورا — اكتشف أفضل أدوات الذكاء الاصطناعي"/>
  <meta property="og:description" content="دليل متميز لأدوات الذكاء الاصطناعي."/>
  <meta property="og:type"        content="website"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css"/>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g1:#8B6914;--g2:#C9A84C;--g3:#E8C96A;
      --gg:linear-gradient(135deg,#8B6914 0%,#C9A84C 40%,#E8C96A 65%,#C9A84C 80%,#8B6914 100%);
      --gt:#8B6914;
      --gl:rgba(139,105,20,.08);--gl2:rgba(139,105,20,.14);--gb:rgba(139,105,20,.22);
      --pg:#FAFAFA;--card:#fff;--surf:#F5F4F1;
      --t1:#111118;--t2:#44444F;--t3:#888896;
      --bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.04);
      --sh:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.05);
      --shh:0 2px 10px rgba(139,105,20,.12),0 8px 28px rgba(0,0,0,.09);
      --r:13px;
    }
    [data-dark]{
      --pg:#0d0f14;--card:#171a22;--surf:#1c1f2a;
      --t1:#f0f0f5;--t2:#9899b2;--t3:#565768;
      --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.04);
      --sh:0 1px 4px rgba(0,0,0,.35),0 4px 16px rgba(0,0,0,.28);
      --shh:0 2px 10px rgba(139,105,20,.2),0 8px 28px rgba(0,0,0,.4);
      --gl:rgba(139,105,20,.12);--gl2:rgba(139,105,20,.18);--gb:rgba(200,168,76,.25);
    }
    body{background:var(--pg);color:var(--t1);font-family:'Cairo',system-ui,sans-serif;font-size:15px;line-height:1.7;transition:background .25s,color .25s}

    /* Gold utilities */
    .g-txt{background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .g-bg{background:var(--gg)}
    .g-border{border-color:var(--gb)!important}

    /* ── NAV ── */
    nav{background:var(--card);border-bottom:.5px solid var(--bdr);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:66px;gap:1rem;position:sticky;top:0;z-index:100}
    .logo img{height:36px;width:auto}
    .nav-mid{display:flex;gap:1.4rem;align-items:center}
    .nav-mid a{font-size:13.5px;color:var(--t2);text-decoration:none;cursor:pointer;font-weight:500;transition:color .15s;white-space:nowrap}
    .nav-mid a:hover{color:var(--gt)}
    .studio-link{display:flex;align-items:center;gap:5px;font-weight:700;cursor:pointer}
    .studio-link span{background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .s-dot{width:6px;height:6px;border-radius:50%;background:var(--gg);flex-shrink:0;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .nav-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .lang-sw{display:flex;background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;overflow:hidden;font-size:12px;font-weight:700}
    .lang-sw button{background:transparent;border:none;padding:6px 12px;cursor:pointer;color:var(--t3);font-family:'Cairo',sans-serif;transition:all .15s}
    .lang-sw button.on{background:var(--gg);color:#fff}
    .lang-div{width:.5px;background:var(--bdr);align-self:stretch}
    .btn-out{background:transparent;border:.5px solid var(--bdr);color:var(--t2);padding:7px 15px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap}
    .btn-out:hover{border-color:var(--gt);color:var(--gt)}
    .btn-gold{background:var(--gg);border:none;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 2px 8px rgba(139,105,20,.25);transition:opacity .15s;white-space:nowrap}
    .btn-gold:hover{opacity:.88}
    .dtog{width:34px;height:34px;background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .15s}
    .dtog:hover{border-color:var(--gt);color:var(--gt)}

    /* ── HERO ── */
    .hero{background:var(--card);border-bottom:.5px solid var(--bdr);padding:4.25rem 2rem 3.25rem;text-align:center;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;top:0;right:0;left:0;height:2px;background:var(--gg)}
    .hero-pill{display:inline-flex;align-items:center;gap:7px;background:var(--gl);color:var(--gt);border:.5px solid var(--gb);font-size:12.5px;padding:6px 16px;border-radius:20px;margin-bottom:1.4rem;font-weight:700}
    .hero-h{font-size:clamp(22px,4vw,46px);font-weight:700;line-height:1.28;color:var(--t1);max-width:660px;margin:0 auto .85rem}
    .hero-h em{font-style:normal;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero-sub{font-size:16px;color:var(--t2);max-width:500px;margin:0 auto .7rem;line-height:1.8}
    .hero-trust{font-size:12.5px;color:var(--t3);margin-bottom:2.25rem;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:500}
    .trust-avs{display:flex}
    .tav{width:26px;height:26px;border-radius:50%;border:2px solid var(--card);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-left:-8px}
    .tav:first-child{margin-left:0}
    [dir=ltr] .tav{margin-left:0;margin-right:-8px}
    [dir=ltr] .tav:first-child{margin-right:0}
    .trust-num{background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700}
    .search-wrap{max-width:610px;margin:0 auto 2.75rem;display:flex;background:var(--card);border:1.5px solid var(--bdr);border-radius:14px;overflow:hidden;box-shadow:var(--sh);transition:border-color .2s}
    .search-wrap:focus-within{border-color:var(--g2)}
    .search-wrap input{flex:1;border:none;background:transparent;padding:16px 20px;font-size:15px;color:var(--t1);outline:none;font-family:'Cairo',sans-serif}
    .search-wrap input::placeholder{color:var(--t3)}
    .search-btn{background:var(--gg);border:none;color:#fff;padding:0 26px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;font-family:'Cairo',sans-serif;transition:opacity .15s;white-space:nowrap}
    .search-btn:hover{opacity:.9}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;max-width:680px;margin:0 auto}
    .stat{background:var(--pg);border:.5px solid var(--bdr);border-radius:13px;padding:1.3rem 1rem;text-align:center;transition:all .2s;cursor:default}
    [data-dark] .stat{background:var(--surf)}
    .stat:hover{border-color:var(--gb);box-shadow:var(--shh)}
    .stat-icon{font-size:22px;margin-bottom:8px;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stat-n{font-size:28px;font-weight:700;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stat-l{font-size:11.5px;color:var(--t3);margin-top:3px;font-weight:500}

    /* ── SECTIONS ── */
    .sec{padding:2.75rem 2rem;max-width:1080px;margin:0 auto}
    .sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
    .sec-title{font-size:19px;font-weight:700;color:var(--t1)}
    .sec-a{font-size:13px;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;font-weight:700}
    .sec-line{width:40px;height:2px;background:var(--gg);border-radius:1px;margin-bottom:1.4rem}
    .surf-bg{background:var(--surf);border-top:.5px solid var(--bdr);border-bottom:.5px solid var(--bdr);padding:2.75rem 2rem}
    .surf-inner{max-width:1080px;margin:0 auto}

    /* ── TOOL CARDS ── */
    .tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(235px,1fr));gap:14px}
    .tool-card{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:1.3rem;cursor:pointer;box-shadow:var(--sh);transition:all .2s;display:flex;flex-direction:column;gap:11px}
    .tool-card:hover{box-shadow:var(--shh);transform:translateY(-2px);border-color:var(--gb)}
    .tc-head{display:flex;align-items:flex-start;gap:12px}
    .tc-logo{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;border:.5px solid var(--bdr);font-family:system-ui,sans-serif}
    .tc-meta{flex:1;min-width:0}
    .tc-name-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .tc-name{font-size:14px;font-weight:700;color:var(--t1)}
    .tc-badge{font-size:10px;background:var(--gl);color:var(--gt);padding:2px 8px;border-radius:4px;font-weight:700;border:.5px solid var(--gb)}
    .tc-stars{display:flex;align-items:center;gap:2px;margin-top:4px}
    .tc-stars i{font-size:12px;color:var(--g2)}
    .tc-rating{font-size:12px;color:var(--t2);margin-right:3px;font-weight:600}
    .tc-views{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:2px;margin-right:4px}
    [dir=ltr] .tc-rating,[dir=ltr] .tc-views{margin-right:0;margin-left:3px}
    .tc-desc{font-size:13px;color:var(--t2);line-height:1.65}
    .tc-foot{display:flex;justify-content:space-between;align-items:center}
    .tc-tags{display:flex;gap:5px;flex-wrap:wrap}
    .tag{background:var(--surf);border:.5px solid var(--bdr2);color:var(--t3);font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
    .tc-cta{background:var(--gg);color:#fff;border:none;font-size:12px;font-weight:700;padding:7px 16px;border-radius:7px;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 2px 6px rgba(139,105,20,.2);display:flex;align-items:center;gap:5px;transition:opacity .15s}
    .tc-cta:hover{opacity:.88}

    /* ── CATEGORIES ── */
    .cats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:12px}
    .cat-card{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:1.5rem 1rem;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:all .2s}
    .cat-card:hover{box-shadow:var(--shh);transform:translateY(-2px);border-color:var(--gb)}
    .cat-icon{width:52px;height:52px;border-radius:14px;background:var(--gl);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:23px}
    .cat-icon i{color:var(--gt)}
    .cat-card:hover .cat-icon{background:var(--gl2)}
    .cat-name{font-size:13px;font-weight:700;color:var(--t1)}
    .cat-count{font-size:11px;color:var(--t3);margin-top:3px;font-weight:500}

    /* ── NEORA STUDIO ── */
    .studio-card{background:var(--t1);border-radius:18px;padding:2.5rem 2.25rem;display:flex;justify-content:space-between;align-items:center;gap:2rem;position:relative;overflow:hidden}
    [data-dark] .studio-card{background:#0f1219;border:.5px solid var(--gb)}
    .studio-card::before{content:'';position:absolute;top:0;right:0;left:0;height:2px;background:var(--gg)}
    .sc-g{position:absolute;top:-60px;left:-60px;width:240px;height:240px;background:rgba(139,105,20,.05);border-radius:50%}
    .studio-content{flex:1;position:relative;z-index:1}
    .studio-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(139,105,20,.18);font-size:11.5px;font-weight:700;padding:5px 14px;border-radius:20px;margin-bottom:1rem}
    .studio-badge span{background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .studio-h{font-size:clamp(17px,2.4vw,26px);font-weight:700;color:#fff;margin-bottom:.65rem;line-height:1.3}
    [data-dark] .studio-h{color:var(--t1)}
    .studio-sub{font-size:14px;color:rgba(255,255,255,.55);line-height:1.75;max-width:440px}
    [data-dark] .studio-sub{color:var(--t2)}
    .studio-actions{display:flex;gap:10px;margin-top:1.6rem;flex-wrap:wrap}
    .studio-cta{background:var(--gg);border:none;color:#fff;padding:12px 24px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 3px 12px rgba(139,105,20,.35);transition:opacity .15s}
    .studio-cta:hover{opacity:.88}
    .studio-ghost{background:rgba(255,255,255,.08);border:.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.82);padding:12px 24px;border-radius:9px;font-size:14px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:500;transition:all .15s}
    .studio-ghost:hover{background:rgba(255,255,255,.15)}
    .studio-orb{width:110px;height:110px;border-radius:50%;border:1px solid rgba(139,105,20,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .studio-orb2{width:74px;height:74px;border-radius:50%;background:rgba(139,105,20,.12);border:1px solid rgba(200,168,76,.4);display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--g2)}

    /* ── TWO-COL (comparisons + trending) ── */
    .two-col{display:grid;grid-template-columns:1fr 295px;gap:1.5rem;max-width:1080px;margin:0 auto;padding:2.75rem 2rem}
    .cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:13px}
    .cmp-card{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:1.3rem;cursor:pointer;box-shadow:var(--sh);transition:all .2s}
    .cmp-card:hover{box-shadow:var(--shh);transform:translateY(-2px)}
    .cmp-card.pick{border-color:var(--g2)}
    .pick-badge{display:inline-block;background:var(--gg);color:#fff;font-size:10px;font-weight:700;padding:3px 11px;border-radius:5px;margin-bottom:10px}
    .cmp-vs{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:5px;font-family:system-ui,sans-serif}
    .cmp-vs em{font-style:normal;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .cmp-desc{font-size:12.5px;color:var(--t2);line-height:1.65;margin-bottom:10px}
    .cmp-foot{display:flex;justify-content:space-between;align-items:center}
    .cmp-r{font-size:12px;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:3px}

    /* ── TRENDING ── */
    .trend-box{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:1.3rem;box-shadow:var(--sh)}
    .trend-line{width:30px;height:2px;background:var(--gg);border-radius:1px;margin-bottom:1rem}
    .trend-tabs{display:flex;gap:4px;margin-bottom:1.3rem;background:var(--surf);border-radius:9px;padding:3px}
    .ttab{flex:1;border:none;background:transparent;color:var(--t3);font-size:12px;font-weight:700;padding:7px 4px;border-radius:7px;cursor:pointer;font-family:'Cairo',sans-serif;text-align:center;transition:all .15s}
    .ttab.on{background:var(--gg);color:#fff;box-shadow:0 2px 6px rgba(139,105,20,.25)}
    .trend-list{display:flex;flex-direction:column;gap:1px}
    .trend-row{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;transition:background .15s}
    .trend-row:hover{background:var(--surf)}
    .tr-num{width:18px;font-size:11px;color:var(--t3);text-align:center;flex-shrink:0;font-weight:700}
    .tr-logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:.5px solid var(--bdr);font-family:system-ui,sans-serif}
    .tr-info{flex:1;min-width:0}
    .tr-name{font-size:13px;font-weight:700;color:var(--t1);font-family:system-ui,sans-serif}
    .tr-sub{font-size:11px;color:var(--t3)}
    .tr-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0}
    .bh{background:var(--gl);color:var(--gt);border:.5px solid var(--gb)}
    .bn{background:#E8F5E9;color:#2E7D32}[data-dark] .bn{background:rgba(46,125,0,.15);color:#81C784}
    .bu{background:var(--gl);color:var(--gt)}

    /* ── ARTICLES ── */
    .arts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:13px}
    .art-card{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:var(--sh);transition:all .2s}
    .art-card:hover{box-shadow:var(--shh);transform:translateY(-2px);border-color:var(--gb)}
    .art-thumb{height:108px;display:flex;align-items:center;justify-content:center;border-bottom:.5px solid var(--bdr)}
    .art-body{padding:1rem}
    .art-cat{font-size:10.5px;font-weight:700;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px}
    .art-title{font-size:13px;font-weight:600;color:var(--t1);line-height:1.5;margin-bottom:6px}
    .art-meta{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:4px}

    /* ── AFFILIATE ── */
    .aff-strip{background:var(--gl);border:.5px solid var(--gb);border-radius:var(--r);padding:1.85rem}
    .aff-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.3rem}
    .aff-htitle{font-size:16px;font-weight:700;color:var(--t1)}
    .aff-lbl{font-size:11px;background:var(--gl2);color:var(--gt);padding:3px 10px;border-radius:5px;font-weight:700;border:.5px solid var(--gb)}
    .aff-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:10px}
    .aff-card{background:var(--card);border:.5px solid var(--bdr);border-radius:10px;padding:.95rem 1rem;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--sh);transition:all .15s}
    .aff-card:hover{box-shadow:var(--shh);border-color:var(--gb)}
    .aff-logo{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:.5px solid var(--bdr);font-family:system-ui,sans-serif}
    .aff-info{flex:1;min-width:0}
    .aff-name{font-size:13px;font-weight:700;color:var(--t1)}
    .aff-hint{font-size:11px;color:var(--t3);margin-top:1px}
    .aff-cta{font-size:11px;font-weight:700;background:var(--gl);color:var(--gt);border:.5px solid var(--gb);padding:5px 10px;border-radius:6px;cursor:pointer;font-family:'Cairo',sans-serif;transition:all .15s;flex-shrink:0}
    .aff-cta:hover{background:var(--gg);color:#fff;border-color:transparent}

    /* ── WHY ── */
    .why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:13px}
    .why-card{background:var(--card);border:.5px solid var(--bdr);border-radius:var(--r);padding:1.5rem 1.3rem;box-shadow:var(--sh);transition:all .2s}
    .why-card:hover{box-shadow:var(--shh);border-color:var(--gb)}
    .why-icon{width:46px;height:46px;border-radius:12px;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:13px}
    .why-icon i{color:var(--gt)}
    .why-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:6px}
    .why-desc{font-size:13px;color:var(--t2);line-height:1.65}

    /* ── NEWSLETTER ── */
    .nl-band{background:var(--t1);padding:4rem 2rem;position:relative;overflow:hidden}
    [data-dark] .nl-band{background:#0a0c11;border-top:.5px solid var(--gb)}
    .nl-band::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gg)}
    .nl-inner{max-width:520px;margin:0 auto;text-align:center;position:relative;z-index:1}
    .nl-inner h2{font-size:23px;font-weight:700;color:#fff;margin-bottom:10px}
    [data-dark] .nl-inner h2{color:var(--t1)}
    .nl-inner p{font-size:14.5px;color:rgba(255,255,255,.5);margin-bottom:2rem;line-height:1.8}
    [data-dark] .nl-inner p{color:var(--t2)}
    .nl-form{display:flex;gap:8px;max-width:430px;margin:0 auto}
    /* Flex direction handled by [dir] */
    [dir=rtl] .nl-form{flex-direction:row-reverse}
    .nl-inp{flex:1;background:rgba(255,255,255,.08);border:.5px solid rgba(255,255,255,.12);border-radius:9px;padding:12px 17px;font-size:14px;color:#fff;outline:none;font-family:'Cairo',sans-serif;transition:border-color .2s}
    [data-dark] .nl-inp{background:rgba(255,255,255,.05);border-color:var(--bdr);color:var(--t1)}
    .nl-inp::placeholder{color:rgba(255,255,255,.3)}
    .nl-inp:focus{border-color:var(--g2)}
    .nl-sub{background:var(--gg);border:none;color:#fff;padding:12px 22px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 3px 10px rgba(139,105,20,.4);transition:opacity .15s;white-space:nowrap}
    .nl-sub:hover{opacity:.88}

    /* ── CTA ── */
    .cta-band{padding:3.5rem 2rem;text-align:center}
    .cta-inner{max-width:540px;margin:0 auto}
    .cta-eyebrow{font-size:11.5px;font-weight:700;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;margin-bottom:1rem;display:block}
    .cta-div{width:50px;height:2px;background:var(--gg);border-radius:1px;margin:.75rem auto 1.25rem}
    .cta-inner h2{font-size:24px;font-weight:700;color:var(--t1);margin-bottom:10px;line-height:1.3}
    .cta-inner p{font-size:14.5px;color:var(--t2);margin-bottom:2rem;line-height:1.75}
    .cta-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    .cta-p{background:var(--gg);border:none;color:#fff;padding:13px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;box-shadow:0 3px 12px rgba(139,105,20,.3);transition:opacity .15s}
    .cta-p:hover{opacity:.88}
    .cta-s{background:var(--card);border:.5px solid var(--bdr);color:var(--t1);padding:13px 28px;border-radius:10px;font-size:14px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:500;box-shadow:var(--sh);transition:all .15s}
    .cta-s:hover{border-color:var(--gt);color:var(--gt)}

    /* ── FOOTER ── */
    footer{background:var(--card);border-top:.5px solid var(--bdr);padding:2.75rem 2rem 1.5rem;position:relative}
    footer::before{content:'';position:absolute;top:0;right:0;width:120px;height:2px;background:var(--gg)}
    .foot-g{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;gap:2rem;max-width:1080px;margin:0 auto 2rem}
    .fb p{font-size:13px;color:var(--t3);line-height:1.75;max-width:200px;margin:.75rem 0 1rem}
    .socs{display:flex;gap:7px}
    .soc{width:33px;height:33px;background:var(--surf);border:.5px solid var(--bdr);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:15px;cursor:pointer;transition:all .15s}
    .soc:hover{border-color:var(--gt);color:var(--gt)}
    .fc h4{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:.95rem}
    .fc a{display:block;font-size:13px;color:var(--t2);text-decoration:none;margin-bottom:7px;cursor:pointer;transition:color .15s}
    .fc a:hover{color:var(--gt)}
    .foot-bot{max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;border-top:.5px solid var(--bdr);padding-top:1.25rem;font-size:12px;color:var(--t3);flex-wrap:wrap;gap:.5rem}
    .foot-star{background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .two-col{grid-template-columns:1fr;padding:2rem 1.25rem}
      .foot-g{grid-template-columns:1fr 1fr;gap:1.5rem}
    }

      .surf-bg{padding:2rem 1rem}
      .foot-g{grid-template-columns:1fr}
      .studio-visual{display:none}
    }

<script src="neora-i18n.js"></script>
<script>
// ── Dynamic content: bilingual tool descriptions & article titles ──────────

    midjourney: { ar: "أفضل أداة لتوليد الصور بالذكاء الاصطناعي بجودة احترافية استثنائية",   en: "Industry-leading AI image generation producing stunning, professional-quality visuals." },
    cursor:     { ar: "محرر كود مدعوم بالذكاء الاصطناعي مع دردشة مدمجة وتعديل متعدد الملفات", en: "AI-powered code editor with inline chat and multi-file edits built in." },
  },
  cmpDesc: {
    "chatgpt-vs-claude":   { ar: "أي مساعد ذكي يتفوق في الكتابة والتفكير والمهام اليومية لعام 2025؟",       en: "Which AI assistant wins for writing, reasoning, and everyday tasks in 2025?" },
    "cursor-vs-windsurf":  { ar: "معركة محررات الكود الذكية — الميزات والأسعار وتجربة المطورين الحقيقية",    en: "Battle of AI code editors — features, pricing, and real developer experience." },
    "claude-code-vs-codex":{ ar: "وكلاء الكود المستقلين من Anthropic وOpenAI في اختبارات حقيقية شاملة",     en: "Anthropic vs OpenAI autonomous code agents — real benchmarks and comprehensive tests." },
  },
  artCat: {
    roundup: { ar: "قائمة شاملة", en: "Roundup" },
    guide:   { ar: "دليل",        en: "Guide" },
    compare: { ar: "مقارنة",      en: "Comparison" },
    news:    { ar: "أخبار",       en: "News" },
  },
  artTitle: {
    "writing-tools-2025":   { ar: "أفضل أدوات الكتابة بالذكاء الاصطناعي لعام 2025", en: "Best AI Writing Tools of 2025, Ranked" },
    "code-editor-guide-2025":{ ar: "كيف تختار محرر الكود الذكي المناسب لك في 2025", en: "How to Choose an AI Code Editor in 2025" },
    "mj-dalle-sd":          { ar: "Midjourney vs DALL-E 3 vs Stable Diffusion",       en: "Midjourney vs DALL-E 3 vs Stable Diffusion" },
    "productivity-q3-2025": { ar: "أفضل 10 أدوات إنتاجية ذكية في الربع الثالث 2025", en: "Top 10 AI Productivity Tools for Q3 2025" },
  },
  artMins: {
    ar: (n) => `${n} دقائق قراءة`,
    en: (n) => `${n} min read`,
  },
};

// ── Trending data ─────────────────────────────────────────────────────────
const trendData = {
  tools: [
    { n:1, l:"G", bg:"#e9faf4", c:"#10a37f", name:"Gemini 2.5 Pro", sub:{ar:"ذكاء اصطناعي عام",en:"General AI"}, b:"trend.featured", bc:"bh" },
    { n:2, l:"C", bg:"#fdf0ea", c:"#cc785c", name:"Claude Code",     sub:{ar:"وكيل برمجة",   en:"Coding agent"}, b:"trend.new",      bc:"bn" },
    { n:3, l:"R", bg:"#fdf3e3", c:"#d97706", name:"Runway Gen-4",    sub:{ar:"فيديو AI",     en:"Video AI"},     b:"trend.featured", bc:"bh" },
    { n:4, l:"P", bg:"#e8f2ff", c:"#0066ff", name:"Perplexity Pro",  sub:{ar:"بحث ذكي",     en:"Smart search"}, b:"trend.recommended", bc:"bu" },
    { n:5, l:"W", bg:"#f0eeff", c:"#6e5ce6", name:"Windsurf",        sub:{ar:"محرر كود",    en:"Code editor"},  b:"trend.recommended", bc:"bu" },
  ],
  cmp: [
    { n:1, l:"C", bg:"#e9faf4", c:"#10a37f", name:"ChatGPT vs Claude",  sub:{ar:"الأكثر قراءة", en:"Most read"},   b:"trend.featured",    bc:"bh" },
    { n:2, l:"C", bg:"#e8f2ff", c:"#0066ff", name:"Cursor vs Windsurf", sub:{ar:"أدوات المطورين",en:"Dev tools"},  b:"trend.recommended", bc:"bu" },
    { n:3, l:"G", bg:"#fdf3e3", c:"#d97706", name:"Gemini vs GPT-4o",   sub:{ar:"عام",         en:"General"},     b:"trend.new",         bc:"bn" },
  ],
  new: [
    { n:1, l:"P", bg:"#fff0f3", c:"#d63864", name:"Pika 2.0",  sub:{ar:"توليد فيديو",    en:"Video gen"},  b:"trend.new", bc:"bn" },
    { n:2, l:"S", bg:"#eef9f4", c:"#059669", name:"Suno v4",   sub:{ar:"موسيقى AI",      en:"AI music"},   b:"trend.new", bc:"bn" },
    { n:3, l:"F", bg:"#f0eeff", c:"#6e5ce6", name:"Figma AI",  sub:{ar:"مساعد تصميم",    en:"Design AI"},  b:"trend.new", bc:"bn" },
  ],
};

// ── Render dynamic content on language change ─────────────────────────────
function renderDynamic(lang) {
  // Tool descriptions
  document.querySelectorAll("[data-tool-desc]").forEach(el => {
    const key = el.getAttribute("data-tool-desc");
    el.textContent = dynamicContent.toolDesc[key]?.[lang] || "";
  });
  // Comparison descriptions
  document.querySelectorAll("[data-cmp-desc]").forEach(el => {
    const key = el.getAttribute("data-cmp-desc");
    el.textContent = dynamicContent.cmpDesc[key]?.[lang] || "";
  });
  // Article cats
  document.querySelectorAll("[data-art-cat]").forEach(el => {
    const key = el.getAttribute("data-art-cat");
    el.textContent = dynamicContent.artCat[key]?.[lang] || "";
  });
  // Article titles
  document.querySelectorAll("[data-art-title]").forEach(el => {
    const key = el.getAttribute("data-art-title");
    el.textContent = dynamicContent.artTitle[key]?.[lang] || "";
  });
  // Article read time
  document.querySelectorAll("[data-art-mins]").forEach(el => {
    const n = el.getAttribute("data-art-mins");
    el.textContent = dynamicContent.artMins[lang](n);
  });
  // Trending
  renderTrend(currentTab, lang);
}

// ── Trending tabs ──────────────────────────────────────────────────────────
let currentTab = "tools";
function renderTrend(tab, lang) {
  const list = document.getElementById("trend-list");
  if (!list) return;
  list.innerHTML = trendData[tab].map(d => `
    <div class="trend-row">
      <span class="tr-num">${d.n}</span>
      <div class="tr-logo" style="background:${d.bg};color:${d.c}">${d.l}</div>
      <div class="tr-info">
        <div class="tr-name">${d.name}</div>
        <div class="tr-sub">${d.sub[lang]}</div>
      </div>
      <span class="tr-badge ${d.bc}">${NeoraI18n.t(d.b)}</span>
    </div>`).join("");
}

document.querySelectorAll(".ttab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".ttab").forEach(b => b.classList.remove("on"));
    btn.classList.add("on");
    currentTab = btn.getAttribute("data-tab");
    renderTrend(currentTab, NeoraI18n.getLang());
  });
});

// ── Dark mode ─────────────────────────────────────────────────────────────
const dtog = document.getElementById("dtog");
dtog.addEventListener("click", () => {
  document.body.hasAttribute("data-dark")
    ? document.body.removeAttribute("data-dark")
    : document.body.setAttribute("data-dark", "");
  dtog.innerHTML = document.body.hasAttribute("data-dark")
    ? '<i class="ti ti-sun" aria-hidden="true"></i>'
    : '<i class="ti ti-moon" aria-hidden="true"></i>';
});

// ── Listen for i18n language change events ────────────────────────────────
document.addEventListener("neora:langchange", (e) => {
  renderDynamic(e.detail.lang);
  // Flip search input direction
  const input = document.querySelector(".search-wrap input");
  if (input) input.dir = e.detail.lang === "ar" ? "rtl" : "ltr";
});

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  NeoraI18n.init("home");
  renderDynamic(NeoraI18n.getLang());
});
</script>
