<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEORA AI – أدوات الذكاء الاصطناعي</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: 'Cairo', sans-serif;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        header h1 {
            font-size: 42px;
            color: #d4af37;
            margin-bottom: 10px;
        }

        header p {
            font-size: 18px;
            opacity: .8;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            padding: 40px 20px;
        }

        .tool-card {
            background: #111;
            padding: 25px;
            border-radius: 14px;
            border: 1px solid #222;
            transition: .3s;
            cursor: pointer;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
        }

        .tool-card h3 {
            color: #d4af37;
            margin-bottom: 10px;
        }

        .tool-card p {
            opacity: .8;
            font-size: 15px;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            opacity: .5;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <h1>NEORA AI</h1>
    <p>دليل شامل لأفضل أدوات الذكاء الاصطناعي – تصميم هجين أسود × ذهبي</p>
</header>

<section class="tools-grid" id="toolsContainer">
    <!-- يتم تعبئتها ديناميكيًا من JSON -->
</section>

<footer>
    © 2026 NEORA AI – All Rights Reserved
</footer>

<script src="assets/js/main.js"></script>
<!-- كود فحص CSS -->
<div id="css-test" style="padding:20px; margin:20px; background:#222; color:#fff; border-radius:10px;">
    إذا تشوف هذا الصندوق بلون رمادي غامق → HTML شغال  
</div>

<script>
    const el = document.createElement("div");
    el.className = "tool-card";
    document.body.appendChild(el);

    const style = window.getComputedStyle(el);

    if (style.borderColor === "rgb(212, 175, 55)") {
        console.log("✔ CSS الجديد محمّل");
        document.getElementById("css-test").innerHTML += "<br>✔ CSS الجديد محمّل";
    } else {
        console.log("❌ CSS غير محمّل أو المسار خطأ");
        document.getElementById("css-test").innerHTML += "<br>❌ CSS غير محمّل أو المسار خطأ";
    }

    el.remove();
</script>
</body>
</html>

</body>
</html>
