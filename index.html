<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEORA AI – أدوات الذكاء الاصطناعي</title>
    
    <style>
        /* التنسيقات الأساسية */
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        header h1 {
            font-size: 42px;
            color: #d4af37;
            margin-bottom: 10px;
        }

        header p {
            font-size: 18px;
            opacity: .8;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            padding: 40px 20px;
        }

        .tool-card {
            background: #111;
            padding: 25px;
            border-radius: 14px;
            border: 1px solid #222;
            transition: .3s;
            cursor: pointer;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
        }

        .tool-card h3 {
            color: #d4af37;
            margin-bottom: 10px;
        }

        .tool-card p {
            opacity: .8;
            font-size: 15px;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            opacity: .5;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <h1>NEORA AI</h1>
    <p>دليل شامل لأفضل أدوات الذكاء الاصطناعي – تصميم هجين أسود × ذهبي</p>
</header>

<section class="tools-grid" id="toolsContainer">
    <!-- هنا ستظهر بطاقات الأدوات -->
</section>

<footer>
    © 2026 NEORA AI – All Rights Reserved
</footer>

<!-- نترك رابط الـ JS في الأسفل كما هو -->
<script src="assets/js/main.js"></script>

</body>
</html>
